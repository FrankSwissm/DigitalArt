<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Milar Digital Art Asset Ledger</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen font-sans antialiased">

    <div id="authOverlay" class="fixed inset-0 bg-gray-950/90 backdrop-blur-md flex items-center justify-center z-50 p-4">
        <div class="bg-gray-900 border border-gray-800 p-6 rounded-2xl w-full max-w-md shadow-2xl">
            <div class="text-center mb-6">
                <h2 id="authTitle" class="text-xl font-black text-amber-500 uppercase tracking-widest">Connect to Semhal Core</h2>
                <p id="authSubtitle" class="text-xs text-gray-400 mt-1">Provide your credentials to establish a ledger session.</p>
            </div>

            <div class="space-y-4">
                <div>
                    <label id="walletLabel" class="text-[10px] uppercase tracking-wider text-gray-400 font-mono block mb-1">Public Wallet Address</label>
                    <input type="text" id="authWallet" placeholder="0x..." class="w-full bg-gray-950 border border-gray-800 rounded-xl p-3 text-sm font-mono text-white focus:outline-none focus:border-amber-500">
                </div>
                <div id="contactField">
                    <label class="text-[10px] uppercase tracking-wider text-gray-400 font-mono block mb-1">Phone or Email Address</label>
                    <input type="text" id="authContact" placeholder="network node address" class="w-full bg-gray-950 border border-gray-800 rounded-xl p-3 text-sm font-mono text-white focus:outline-none focus:border-amber-500">
                </div>
                <div id="passwordField">
                    <label class="text-[10px] uppercase tracking-wider text-gray-400 font-mono block mb-1">Access Pin / Password</label>
                    <input type="password" id="authPassword" placeholder="••••••••" class="w-full bg-gray-950 border border-gray-800 rounded-xl p-3 text-sm font-mono text-white focus:outline-none focus:border-amber-500">
                </div>
            </div>

            <div class="mt-6 space-y-2">
                <button onclick="handleAuthSubmit()" id="primaryAuthBtn" class="w-full bg-amber-500 hover:bg-amber-400 text-gray-950 font-black py-3 rounded-xl uppercase tracking-wider transition text-sm shadow-md">Establish Login Session</button>
                <div class="flex justify-between text-xs font-mono pt-2 px-1 text-gray-400">
                    <button onclick="toggleAuthMode('register')" id="switchRegisterBtn" class="hover:text-white underline">Register Account</button>
                    <button onclick="toggleAuthMode('reset')" id="switchResetBtn" class="hover:text-white underline">Reset Options</button>
                </div>
            </div>
        </div>
    </div>

    <div id="appWorkspace" class="hidden">
        <header class="border-b border-gray-800 bg-gray-950 p-4 sticky top-0 z-40 shadow-md">
            <div class="max-w-7xl mx-auto flex flex-col sm:flex-row justify-between items-center gap-4">
                <div>
                    <h1 class="text-lg font-black tracking-wider text-amber-500 uppercase">🏛️ Milar Digital Art Asset</h1>
                    <p class="text-[10px] text-gray-500 font-mono mt-0.5">Semhal Network Synchronized Node Cluster</p>
                </div>
                <div class="flex items-center gap-4 bg-gray-900 p-2.5 rounded-xl border border-gray-800 w-full sm:w-auto justify-between gap-6">
                    <div>
                        <label class="text-[9px] text-gray-400 block font-bold tracking-widest uppercase">Active Identity Profile</label>
                        <span id="activeUserDisplay" class="text-xs font-mono font-bold text-amber-400 block">Loading User...</span>
                        <span id="activeWalletDisplay" class="text-[10px] font-mono text-gray-500 block">0x...</span>
                    </div>
                    <button onclick="terminateSession()" class="text-xs bg-gray-950 border border-gray-800 px-3 py-1.5 rounded-lg hover:bg-red-950/30 font-mono text-gray-400 hover:text-red-400 transition">Disconnect</button>
                </div>
            </div>
        </header>

        <main class="max-w-7xl mx-auto p-6">
            <div class="mb-6">
                <input id="matrixSearch" type="text" placeholder="🔍 Filter ledger matrices allocations..." oninput="filterLocalGrid()" class="w-full max-w-sm bg-gray-950 border border-gray-800 rounded-xl p-3 text-xs font-mono focus:outline-none focus:border-amber-500 text-white shadow-inner">
            </div>
            <section>
                <div id="marketGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                    <div class="text-center text-gray-500 py-12 col-span-full font-mono text-xs">Fetching decentralized token balances...</div>
                </div>
            </section>
        </main>
    </div>

    <script>
        const API_BASE = window.location.origin + "/api";
        let currentSessionWallet = "";
        let currentSessionUser = "";
        let currentAuthMode = "login"; 
        let localCacheMatrix = [];

        function toggleAuthMode(mode) {
            currentAuthMode = mode;
            const title = document.getElementById("authTitle");
            const subtitle = document.getElementById("authSubtitle");
            const primaryBtn = document.getElementById("primaryAuthBtn");
            const walletLabel = document.getElementById("walletLabel");
            
            document.getElementById("passwordField").style.display = (mode === "reset") ? "none" : "block";
            document.getElementById("contactField").style.display = "block";

            if (mode === "login") {
                title.innerText = "Connect to Semhal Core";
                subtitle.innerText = "Provide your credentials to establish a ledger session.";
                primaryBtn.innerText = "Establish Login Session";
                walletLabel.innerText = "Public Wallet Address";
            } else if (mode === "register") {
                title.innerText = "Register Public Node";
                subtitle.innerText = "Join the Semhal financial framework network.";
                primaryBtn.innerText = "Broadcast Registration";
                walletLabel.innerText = "Exact Semhal Cryptocurrency Public Address";
            } else if (mode === "reset") {
                title.innerText = "Reset Account Options";
                subtitle.innerText = "Request an authentication security token link via communication networks.";
                primaryBtn.innerText = "Transmit Recovery Request";
                walletLabel.innerText = "Public Wallet Address";
            }
        }

        async function handleAuthSubmit() {
            const wallet = document.getElementById("authWallet").value.trim();
            const contact = document.getElementById("authContact").value.trim();
            const password = document.getElementById("authPassword").value.trim();

            if (!wallet || !contact || (currentAuthMode !== 'reset' && !password)) {
                alert("Please fill out all required interface parameters.");
                return;
            }

            // Client-side guard checking for the exact requested registration format bounds
            if (currentAuthMode === "register") {
                if (!wallet.startsWith("0x") || wallet.length < 42) {
                    alert("🚨 Registration Halted: You must input your exact Semhal cryptocurrency public wallet address (starting with 0x).");
                    return;
                }
            }

            let endpoint = `${API_BASE}/auth/${currentAuthMode}`;
            let payload = { wallet, contact, password };

            try {
                const response = await fetch(endpoint, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                });
                const resData = await response.json();

                if (!response.ok || resData.status === "error") {
                    alert(`Authentication Rejected: ${resData.message}`);
                    return;
                }

                if (currentAuthMode === "reset") {
                    alert("Recovery transmission successful. Check your phone network or email terminal for instructions.");
                    toggleAuthMode("login");
                    return;
                }

                if (currentAuthMode === "register") {
                    alert("Account registration broadcast accepted! Proceeding to initialize session.");
                }

                // Initialize authenticated profile views
                currentSessionWallet = wallet;
                currentSessionUser = contact;
                
                document.getElementById("activeUserDisplay").innerText = currentSessionUser;
                document.getElementById("activeWalletDisplay").innerText = currentSessionWallet;
                
                document.getElementById("authOverlay").classList.add("hidden");
                document.getElementById("appWorkspace").classList.remove("hidden");
                
                loadGridInventory();
            } catch (err) {
                alert("Communication node unreachable during authentication.");
            }
        }

        async function loadGridInventory() {
            try {
                const response = await fetch(`${API_BASE}/ledger?wallet=${currentSessionWallet}`);
                if (!response.ok) throw new Error();
                localCacheMatrix = await response.json();
                renderGrid(localCacheMatrix);
            } catch (err) {
                document.getElementById("marketGrid").innerHTML = `
                    <div class="col-span-full border border-red-950 bg-red-950/20 text-red-400 p-5 rounded-xl text-center text-xs font-mono max-w-xl mx-auto">
                        ⚠️ Terminal Error: Failed to synchronize ledger positions with the remote network cluster.
                    </div>
                `;
            }
        }

        function renderGrid(assets) {
            const grid = document.getElementById("marketGrid");
            grid.innerHTML = ""; 

            assets.forEach(item => {
                const ownedCount = item.user_owned_shards || 0;
                const card = document.createElement("div");
                card.className = "p-5 rounded-xl border border-gray-800 bg-gray-950 flex flex-col justify-between hover:border-gray-700 transition duration-150 shadow-lg";
                
                card.innerHTML = `
                    <div>
                        <div class="flex justify-between items-center gap-2 mb-3">
                            <span class="font-mono text-[10px] text-gray-500 font-bold">NODE: #${item.id}</span>
                            <span class="bg-gray-900 border border-gray-800 text-gray-400 text-[9px] px-2 py-0.5 rounded-md font-mono font-bold uppercase tracking-wide">${item.tag || 'SHARD'}</span>
                        </div>
                        <h3 class="text-base font-bold text-white mb-1">${item.name}</h3>
                        
                        <div class="mt-3 bg-gray-900 border border-gray-800 p-2.5 rounded-lg flex justify-between items-center">
                            <span class="text-xs text-gray-400">Position:</span>
                            <span class="text-xs font-mono font-bold ${ownedCount > 0 ? 'text-emerald-400 font-black' : 'text-gray-600'}">${ownedCount.toLocaleString()} Shards</span>
                        </div>

                        <div class="font-mono text-xs text-gray-400 mt-4 mb-4 flex justify-between items-center bg-gray-900/30 p-1.5 px-2.5 rounded-md border border-gray-900">
                            <span class="text-gray-500 text-[11px]">Value Matrix:</span>
                            <span class="text-amber-500 font-black">${item.price_susd} SUSD</span>
                        </div>
                    </div>

                    <div class="pt-3 border-t border-gray-900 mt-1">
                        <div class="flex items-center gap-2">
                            <input type="number" id="qty-${item.id}" value="10" min="1" class="w-16 bg-gray-900 border border-gray-800 rounded-lg p-2 text-center text-xs font-mono font-bold text-white focus:outline-none">
                            <div class="flex gap-2 flex-1">
                                <button onclick="executeTrade('${item.id}', 'buy')" class="flex-1 bg-amber-500 hover:bg-amber-400 text-gray-950 font-black text-xs py-2 rounded-lg uppercase tracking-wider transition">Buy</button>
                                <button onclick="executeTrade('${item.id}', 'sell')" class="flex-1 bg-gray-900 hover:bg-red-950/40 border border-gray-800 hover:border-red-900 text-gray-400 hover:text-red-400 font-bold text-xs py-2 rounded-lg uppercase tracking-wider transition">Sell P2P</button>
                            </div>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function filterLocalGrid() {
            const token = document.getElementById("matrixSearch").value.toLowerCase().trim();
            const matching = localCacheMatrix.filter(item => 
                item.name.toLowerCase().includes(token) || item.id.toString().includes(token)
            );
            renderGrid(matching);
        }

        async function executeTrade(assetId, actionType) {
            const size = parseInt(document.getElementById(`qty-${assetId}`).value);
            let recipientUser = "";

            if (actionType === "sell") {
                const responsePrompt = prompt("⚠️ CRITICAL SETTLEMENT:\nEnter buyer's Semhal Cryptocurrency public wallet address to authorize P2P transfer:");
                if (responsePrompt === null) return; 
                recipientUser = responsePrompt.trim();
                if(!recipientUser || !recipientUser.startsWith("0x")) { 
                    alert("🚨 Transaction Aborted: Invalid or malformed buyer Semhal public wallet key configuration."); 
                    return; 
                }
            }

            try {
                const response = await fetch(`${API_BASE}/transaction`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        action: actionType,
                        wallet: currentSessionWallet,
                        target_recipient: recipientUser,
                        asset_id: assetId,
                        amount: size
                    })
                });

                const payload = await response.json();
                if (payload.status !== "synchronized" && payload.status !== "success") {
                    alert(`🚨 Settlement Halted: ${payload.message}`);
                    return;
                }

                // Enforce exact structural parameters for confirmation output layout
                const senderAddress = actionType === "buy" ? "0x0A5AbC999e6880059B321496336BC173A1667AF0" : currentSessionWallet;
                const receiverAddress = actionType === "buy" ? currentSessionWallet : recipientUser;
                const currentTimestamp = new Date().toLocaleString();

                // Intercept execution and generate the clean requested text receipt layout directly
                alert(
                    `SEMHAL CERYPTOCURRENCY\n\n` +
                    `Send full public address\n${senderAddress}\n\n` +
                    `Reciver full public address\n${receiverAddress}\n\n` +
                    `Amout transfer\n${size.toLocaleString()} Shards\n\n` +
                    `Date\n${currentTimestamp}`
                );

                loadGridInventory(); 
            } catch (err) {
                alert("❌ Gateway transmission error. Network pipeline timed out.");
            }
        }

        function terminateSession() {
            currentSessionWallet = "";
            currentSessionUser = "";
            document.getElementById("authOverlay").classList.remove("hidden");
            document.getElementById("appWorkspace").classList.add("hidden");
        }
    </script>
</body>
</html
